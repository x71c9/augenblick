---
name: Release on PR Merge
on:
  pull_request:
    types: [closed]
    branches: [master]
permissions:
  contents: write
jobs:
  release:
    uses: x71c9/ci-rust/.github/workflows/release-on-merge.yml@master
    with:
      crate_name: augenblick
      binary_name: augenblick
      homebrew_event: update-augenblick
      pkgdesc: "Fullscreen eye-blink overlay for X11 and Wayland"
      aur_depends: "'glibc' 'libxcb'"
      nur_build_inputs: "libxcb"
      extra_apt_packages: "libxcb1-dev libwayland-dev"
      macos_extra_brew: "--cask xquartz"
      macos_extra_env: "LIBRARY_PATH=/opt/X11/lib PKG_CONFIG_PATH=/opt/X11/lib/pkgconfig"
    secrets: inherit
